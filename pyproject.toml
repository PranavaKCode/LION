[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "paper-yolov8"
version = "0.2.0"
description = "Modern YOLOv8 reproduction workflow for the public datasets used in the kluless13/paper repo."
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
  "ultralytics>=8.3.0,<9",
  "roboflow>=1.1.0,<2",
  "pyyaml>=6.0,<7",
]

[project.scripts]
paper-yolo = "lionfish_yolo:main"
lionfish-yolo = "lionfish_yolo:main"

[tool.setuptools]
py-modules = ["lionfish_yolo"]
